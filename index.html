<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de cotización para recubrimiento anticorrosivo InfiniGuard - Serpentines y equipos HVAC">
  <title>InfiniGuard - Sistema de Cotización</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css?v=22.0">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
  <div id="app">
    <!-- Loading state -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0e1a">
      <div style="text-align:center">
        <div class="spinner" style="margin:0 auto 16px;width:40px;height:40px;border-width:4px"></div>
        <p style="color:#9ca3af;font-family:Inter,sans-serif">Cargando InfiniGuard...</p>
      </div>
    </div>
  </div>

  <!-- Libraries (Local, Offline Support) -->
  <!-- SheetJS for Excel reading -->
  <script src="js/libs/xlsx.full.min.js"></script>
  <!-- jsPDF for PDF generation -->
  <script src="js/libs/jspdf.umd.min.js"></script>
  <script>
    // Fix global reference so autoTable plugin can register correctly
    if (window.jspdf && window.jspdf.jsPDF) {
      window.jsPDF = window.jspdf.jsPDF;
    }
  </script>
  <!-- jsPDF AutoTable plugin -->
  <script src="js/libs/jspdf.plugin.autotable.min.js"></script>

  <!-- Lucide Icons -->
  <script src="js/libs/lucide.min.js"></script>

  <!-- App Modules (order matters) -->
  <script src="js/utils.js?v=22.0"></script>
  <script src="js/storage.js?v=22.0"></script>
  <script>
    // Dynamically load seed-data.js only if it's a valid javascript file and not index.html fallback
    fetch('js/seed-data.js?v=22.0')
      .then(res => {
        const ct = res.headers.get('content-type') || '';
        if (res.ok && !ct.includes('text/html')) {
          return res.text();
        }
        throw new Error('Seed data not available or fallback to HTML');
      })
      .then(code => {
        const script = document.createElement('script');
        script.text = code;
        document.body.appendChild(script);
      })
      .catch(() => {
        console.log('Running in remote production database mode. Local seed data skipped.');
      });
  </script>
  <script src="js/excel-importer.js?v=22.0"></script>
  <script src="js/calculator.js?v=22.0"></script>
  <script src="js/pdf-generator.js?v=22.0"></script>
  <script src="js/app.js?v=22.0"></script>
  <script src="js/auth.js?v=22.0"></script>

  <!-- Boot -->
  <script>
    document.addEventListener('DOMContentLoaded', () => Auth.check());
  </script>
</body>
</html>
